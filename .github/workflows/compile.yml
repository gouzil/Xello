name: CI Compile

on:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - c
          - cpp
          - go
          - rust
          - zig
          - kotlin_native
          - wasm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v5
        if: matrix.language == 'go'
        with:
          go-version: stable
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.language == 'rust'
      - name: Install native dependencies
        if: contains(fromJSON('["python","c","cpp","zig","kotlin_native","wasm"]'), matrix.language)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl g++
      - uses: mlugg/setup-zig@v2
        if: matrix.language == 'zig'
        with:
          version: 0.16.0
      - uses: actions/setup-java@v5
        if: matrix.language == 'kotlin_native'
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Kotlin/Native
        if: matrix.language == 'kotlin_native'
        env:
          KOTLIN_NATIVE_VERSION: 1.9.24
        run: |
          curl --retry 5 --retry-delay 10 --retry-connrefused --retry-all-errors -fsSL \
            -o "${RUNNER_TEMP}/kotlin-native.tar.gz" \
            "https://repo.maven.apache.org/maven2/org/jetbrains/kotlin/kotlin-native-prebuilt/${KOTLIN_NATIVE_VERSION}/kotlin-native-prebuilt-${KOTLIN_NATIVE_VERSION}-linux-x86_64.tar.gz"
          tar -xzf "${RUNNER_TEMP}/kotlin-native.tar.gz" -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/kotlin-native-prebuilt-linux-x86_64-${KOTLIN_NATIVE_VERSION}/bin" >> "$GITHUB_PATH"
      - uses: bytecodealliance/actions/wasm-tools/setup@v1
        if: matrix.language == 'wasm'
        with:
          version: "1.246.2"
      - run: python tools/build.py --languages "${{ matrix.language }}"
