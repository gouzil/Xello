name: CI Compile

on:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - c
          - cpp
          - go
          - rust
          - zig
          - kotlin_native
          - wasm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v5
        if: matrix.language == 'go'
        with:
          go-version: stable
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.language == 'rust'
      - name: Install native dependencies
        if: contains(fromJSON('["python","c","cpp","zig","kotlin_native","wasm"]'), matrix.language)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl default-jre-headless g++ xz-utils
      - name: Install Zig
        if: matrix.language == 'zig'
        env:
          ZIG_VERSION: 0.15.1
        run: |
          curl --retry 5 --retry-delay 10 --retry-connrefused --retry-all-errors -fsSL \
            -o "${RUNNER_TEMP}/zig.tar.xz" \
            "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          sudo tar -xJ -C /opt -f "${RUNNER_TEMP}/zig.tar.xz"
          sudo ln -s "/opt/zig-x86_64-linux-${ZIG_VERSION}/zig" /usr/local/bin/zig
      - name: Install Kotlin/Native
        if: matrix.language == 'kotlin_native'
        env:
          KOTLIN_NATIVE_VERSION: 1.9.24
        run: |
          curl --retry 5 --retry-delay 10 --retry-connrefused --retry-all-errors -fsSL \
            -o "${RUNNER_TEMP}/kotlin-native.tar.gz" \
            "https://repo.maven.apache.org/maven2/org/jetbrains/kotlin/kotlin-native-prebuilt/${KOTLIN_NATIVE_VERSION}/kotlin-native-prebuilt-${KOTLIN_NATIVE_VERSION}-linux-x86_64.tar.gz"
          tar -xzf "${RUNNER_TEMP}/kotlin-native.tar.gz" -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/kotlin-native-prebuilt-linux-x86_64-${KOTLIN_NATIVE_VERSION}/bin" >> "$GITHUB_PATH"
      - name: Install wasm-tools
        if: matrix.language == 'wasm'
        env:
          WASM_TOOLS_VERSION: 1.246.2
        run: |
          curl --retry 5 --retry-delay 10 --retry-connrefused --retry-all-errors -fsSL \
            -o "${RUNNER_TEMP}/wasm-tools.tar.gz" \
            "https://github.com/bytecodealliance/wasm-tools/releases/download/v${WASM_TOOLS_VERSION}/wasm-tools-${WASM_TOOLS_VERSION}-x86_64-linux.tar.gz"
          sudo tar -xzf "${RUNNER_TEMP}/wasm-tools.tar.gz" -C /usr/local/bin --strip-components=1 "wasm-tools-${WASM_TOOLS_VERSION}-x86_64-linux/wasm-tools"
      - run: python tools/build.py --languages "${{ matrix.language }}"
